name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Audit, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: monitor
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://monitor:monitor@127.0.0.1:54329/monitor
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-placeholder-password
      ADMIN_API_TOKEN: ci-placeholder-api-token
      ADMIN_SESSION_SECRET: ci-placeholder-session-secret-32bytes!!
      RUN_DB_INTEGRATION_TESTS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify database migrations
        run: pnpm db:migrate && pnpm db:seed

      - name: Audit public-release safety
        run: pnpm audit:open-source -- --history

      - name: Evaluate content rules
        run: pnpm content:evaluate
        continue-on-error: true

      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck start.sh scripts/test-upgrade.sh uninstall.sh
      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose
        run: docker compose config

  smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: validate
    env:
      POSTGRES_PASSWORD: monitor
      JIANWEI_DOMAIN: localhost
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: smoke-test-password
      ADMIN_API_TOKEN: smoke-test-token
      ADMIN_SESSION_SECRET: smoke-test-session-secret-32bytes!!
      DATABASE_URL: postgres://monitor:monitor@postgres:5432/monitor
      WERSS_BASE_URL: http://werss:8001
      BRAVE_API_KEY: placeholder
      X_BEARER_TOKEN: placeholder
      SUPERGROK_REFRESH_TOKEN: placeholder
      TRENDRADAR_REFRESH_TOKEN: placeholder
      SUMMARY_PROVIDER: ""
      BUDGET_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Build and start stack
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci.yml up -d --build --wait
      - name: Verify health endpoints
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/api/health && break
            sleep 3
          done
      - name: Verify login page
        run: curl -sf http://localhost:3000/admin | grep -q "登录" && echo "Login page OK"
      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose down -v

  db-upgrade:
    name: DB upgrade test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: monitor
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://monitor:monitor@127.0.0.1:54329/monitor
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB upgrade test
        run: bash scripts/test-upgrade.sh

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke
    env:
      POSTGRES_PASSWORD: monitor
      JIANWEI_DOMAIN: localhost
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      TRENDRADAR_REFRESH_TOKEN: placeholder
      E2E_BASE_URL: http://localhost:3000
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: smoke-test-password
      ADMIN_API_TOKEN: smoke-test-token
      ADMIN_SESSION_SECRET: smoke-test-session-secret-32bytes!!
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci.yml up -d --build --wait
      - name: Wait for web
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run E2E tests
        run: pnpm test:e2e
      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose down -v
