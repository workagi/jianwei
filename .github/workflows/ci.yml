name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Audit, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: monitor
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://monitor:monitor@127.0.0.1:54329/monitor
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci-placeholder-password
      ADMIN_API_TOKEN: ci-placeholder-api-token
      RUN_DB_INTEGRATION_TESTS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify database migrations
        run: pnpm db:migrate && pnpm db:seed

      - name: Audit public-release safety
        run: pnpm audit:open-source -- --history

      - name: Evaluate content rules
        run: pnpm content:evaluate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose
        run: docker compose config
