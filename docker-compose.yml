services:
  # --- Data store ---------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
    # 仅绑定本机回环，禁止数据库端口对外暴露（默认 0.0.0.0 会允许任意主机直连）。
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - monitor-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- One-shot schema migration -----------------------------------------
  # Applies Drizzle migrations once, then exits. web and worker wait for it
  # to complete successfully (service_completed_successfully) so the schema
  # always exists before anything reads/writes the database.
  migrate:
    build:
      context: .
      target: tools
    environment:
      DATABASE_URL: postgres://monitor:${POSTGRES_PASSWORD:-monitor}@postgres:5432/monitor
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed"]
    restart: "no"

  # --- SignalDeck web (Next.js standalone) -------------------------------
  web:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: postgres://monitor:${POSTGRES_PASSWORD:-monitor}@postgres:5432/monitor
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-development-only-change-me}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      WERSS_BASE_URL: http://werss:8001
      WERSS_ACCESS_KEY: ${WERSS_ACCESS_KEY:-}
      TRENDRADAR_MCP_URL: http://trendradar-mcp:3333/mcp
      TRENDRADAR_CONFIG_DIR: /app/trendradar-config
      TRENDRADAR_REFRESH_URL: http://trendradar-refresh:8090/refresh
      TRENDRADAR_REFRESH_TOKEN: ${TRENDRADAR_REFRESH_TOKEN:-development-only-change-me}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./infra/trendradar/config:/app/trendradar-config
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      werss:
        condition: service_started
      trendradar-mcp:
        condition: service_started
      trendradar-refresh:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- Collector worker (long-running) -----------------------------------
  # Pulls due monitors, gathers via source adapters (X / WeChat / Brave /
  # TrendRadar), ingests into Postgres. Runs a continuous poll loop
  # (WORKER_POLL_INTERVAL_SECONDS) and shuts down gracefully on SIGTERM.
  worker:
    build:
      context: .
      target: tools
    environment:
      DATABASE_URL: postgres://monitor:${POSTGRES_PASSWORD:-monitor}@postgres:5432/monitor
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-development-only-change-me}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      WERSS_BASE_URL: http://werss:8001
      WERSS_ACCESS_KEY: ${WERSS_ACCESS_KEY:-}
      TRENDRADAR_MCP_URL: http://trendradar-mcp:3333/mcp
      X_BRAVE_MONTHLY_BUDGET_USD: ${X_BRAVE_MONTHLY_BUDGET_USD:-}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-60}
      WORKER_DISABLE_MONITOR_AFTER_FAILURES: ${WORKER_DISABLE_MONITOR_AFTER_FAILURES:-5}
      WORKER_HEARTBEAT_FILE: ${WORKER_HEARTBEAT_FILE:-/tmp/signaldeck-worker-heartbeat}
      WORKER_HEALTHCHECK_STALE_SECONDS: ${WORKER_HEALTHCHECK_STALE_SECONDS:-600}
      # AI 摘要（预留接口，默认未启用；详见 src/lib/summarizer.ts 与 .env.example）
      SUMMARY_PROVIDER: ${SUMMARY_PROVIDER:-}
      SUMMARY_BASE_URL: ${SUMMARY_BASE_URL:-}
      SUMMARY_API_KEY: ${SUMMARY_API_KEY:-}
      SUMMARY_SKIP_PLATFORMS: ${SUMMARY_SKIP_PLATFORMS:-wechat}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-}
      SUMMARY_TIMEOUT_SECONDS: ${SUMMARY_TIMEOUT_SECONDS:-20}
      SUMMARY_MAX_CONCURRENCY: ${SUMMARY_MAX_CONCURRENCY:-4}
    command: ["pnpm", "worker"]
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('fs');const p=process.env.WORKER_HEARTBEAT_FILE||'/tmp/signaldeck-worker-heartbeat';const max=(Number(process.env.WORKER_HEALTHCHECK_STALE_SECONDS)||600)*1000;const age=Date.now()-fs.statSync(p).mtimeMs;process.exit(age<=max?0:1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # --- WeRSS sidecar (WeChat Official Account RSS) -----------------------
  werss:
    image: we-mp-rss:with-chromium  # 本地镜像（基于 rachelos/we-mp-rss:latest 预装 playwright+chromium）
    # 仅绑定本机回环；WeRSS 后台含授权操作，不应直接对外暴露。
    environment:
      # 改用 web 方式授权：前端出二维码、手机微信扫码完成授权，
      # 不依赖容器内的 headless 浏览器（该镜像默认未打包浏览器，会导致扫码绑定失败）。
      - WERSS_AUTH_WEB=True
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - werss-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8001/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # --- TrendRadar sidecar (hotlists / RSS / scheduling / AI) -------------
  trendradar:
    image: wantcat/trendradar:latest
    environment:
      TZ: Asia/Shanghai
      WEBSERVER_PORT: 8080
      CRON_SCHEDULE: ${TRENDRADAR_CRON_SCHEDULE:-*/30 * * * *}
      RUN_MODE: cron
      IMMEDIATE_RUN: "true"
      AI_ANALYSIS_ENABLED: ${AI_ANALYSIS_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_BASE: ${AI_API_BASE:-}
    ports:
      - "127.0.0.1:${TRENDRADAR_WEBSERVER_PORT:-8088}:8080"
    volumes:
      - ./infra/trendradar/config:/app/config:ro
      - trendradar-output:/app/output
    restart: unless-stopped

  # --- TrendRadar MCP sidecar (query tools for SignalDeck) ---------------
  trendradar-mcp:
    image: wantcat/trendradar-mcp:latest
    environment:
      TZ: Asia/Shanghai
      MCP_PORT: 3333
    ports:
      - "127.0.0.1:3333:3333"
    volumes:
      - ./infra/trendradar/config:/app/config:ro
      - trendradar-output:/app/output
    restart: unless-stopped

  # --- Internal refresh helper for "Save and refresh now" ----------------
  # TrendRadar itself serves static reports and runs collection by cron; it
  # does not expose a refresh endpoint. This helper shares the same config and
  # output volumes, accepts only internal Docker-network requests, and runs one
  # fixed command (`python -m trendradar`) without exposing the Docker socket.
  trendradar-refresh:
    image: wantcat/trendradar:latest
    environment:
      TZ: Asia/Shanghai
      RUN_MODE: control
      TREND_REFRESH_TOKEN: ${TRENDRADAR_REFRESH_TOKEN:-development-only-change-me}
      AI_ANALYSIS_ENABLED: ${AI_ANALYSIS_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_BASE: ${AI_API_BASE:-}
    command: ["python", "/app/refresh-server.py"]
    volumes:
      - ./infra/trendradar/config:/app/config:ro
      - ./infra/trendradar/refresh-server.py:/app/refresh-server.py:ro
      - trendradar-output:/app/output
    restart: unless-stopped

volumes:
  monitor-postgres:
  werss-data:
  trendradar-output:
